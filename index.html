<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>UstaYapı</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f59e0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="UstaYapı">
<link rel="apple-touch-icon" href="icon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#07090f;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#e8edf5;overscroll-behavior:none}
#boot{position:fixed;inset:0;background:#07090f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999}
.spin{width:36px;height:36px;border:3px solid rgba(245,158,11,.2);border-top-color:#f59e0b;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
input,select,button,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#1b2438;border-radius:4px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#0e1420;border:1px solid #1b2438;border-radius:18px;width:100%;max-height:92vh;overflow-y:auto}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #1b2438;position:sticky;top:0;background:#0e1420;z-index:1}
.modal-bd{padding:22px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:10px;font-weight:700;cursor:pointer;border:none;white-space:nowrap;transition:opacity .15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#f59e0b;color:#0a0800}
.btn-ghost{background:transparent;color:#7a8ba8;border:1px solid #1b2438}
.btn-danger{background:rgba(240,82,82,.08);color:#f05252;border:1px solid rgba(240,82,82,.25)}
.btn-success{background:rgba(16,217,138,.08);color:#10d98a;border:1px solid rgba(16,217,138,.25)}
.btn-blue{background:rgba(79,156,249,.08);color:#4f9cf9;border:1px solid rgba(79,156,249,.25)}
.btn-purple{background:rgba(167,139,250,.08);color:#a78bfa;border:1px solid rgba(167,139,250,.25)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-md{padding:10px 20px;font-size:14px}
.btn-lg{padding:13px 28px;font-size:15px}
.btn-full{width:100%}
.inp{background:#07090f;border:1px solid #1b2438;border-radius:10px;padding:10px 14px;color:#e8edf5;font-size:14px;outline:none;width:100%;box-sizing:border-box}
.inp:focus{border-color:#f59e0b}
.sel{background:#07090f;border:1px solid #1b2438;border-radius:10px;padding:10px 14px;color:#e8edf5;font-size:14px;outline:none;width:100%}
.card{background:#0e1420;border:1px solid #1b2438;border-radius:14px;padding:20px}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;display:inline-block}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:0}
.field label{font-size:11px;color:#4a5568;font-weight:700;text-transform:uppercase;letter-spacing:.7px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.flex{display:flex;align-items:center}
.gap8{gap:8px}
.gap10{gap:10px}
.row{display:flex;justify-content:space-between;align-items:center}
nav button{background:transparent;border:none;border-radius:10px;padding:10px 12px;cursor:pointer;color:#7a8ba8;font-size:14px;display:flex;align-items:center;gap:10px;width:100%;text-align:left;font-weight:500;margin-bottom:2px}
nav button.active{background:rgba(245,158,11,.09);color:#f59e0b;font-weight:700}
table{width:100%;border-collapse:collapse}
th{padding:11px 12px;text-align:left;font-size:10px;color:#4a5568;font-weight:700;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid #1b2438}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid #1b2438}
tr:last-child td{border-bottom:none}
.notif-panel{position:fixed;top:0;right:0;bottom:0;width:290px;background:#0e1420;border-left:1px solid #1b2438;z-index:500;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.5)}
@media print{#print-area{display:block!important}body>*:not(#print-area){display:none!important}}
#print-area{display:none}
@media(max-width:768px){.grid2{grid-template-columns:1fr}.grid3{grid-template-columns:1fr 1fr}}
.tag{display:inline-block;padding:5px 12px;border-radius:20px;border:1px solid #1b2438;background:transparent;color:#7a8ba8;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.tag.active{border-color:rgba(245,158,11,.28);background:rgba(245,158,11,.09);color:#f59e0b;font-weight:700}
.save-status{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);border-radius:20px;padding:8px 20px;font-size:13px;font-weight:700;z-index:500;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:opacity .3s}
</style>
</head>
<body>
<div id="boot">
  <svg width="68" height="68" viewBox="0 0 80 80" fill="none">
    <rect width="80" height="80" rx="18" fill="#0d3d4f"/>
    <rect x="22" y="38" width="36" height="24" rx="2" fill="#b08030"/>
    <rect x="18" y="32" width="44" height="8" rx="2" fill="#c9952a"/>
    <rect x="26" y="42" width="8" height="7" rx="1" fill="#e8c96a"/>
    <rect x="46" y="42" width="8" height="7" rx="1" fill="#e8c96a"/>
    <rect x="34" y="50" width="12" height="12" rx="1" fill="#7a5520"/>
    <path d="M12 28 Q8 24 10 19 L13 22 L16 19 Q20 21 18 26 L14 30Z" fill="#f5a623"/>
    <rect x="56" y="18" width="14" height="6" rx="2" fill="#f5a623" transform="rotate(-35 56 18)"/>
    <rect x="64" y="20" width="3" height="14" rx="1" fill="#f5a623" transform="rotate(-35 64 20)"/>
    <circle cx="40" cy="67" r="5" fill="none" stroke="#f5a623" stroke-width="2.5"/>
    <circle cx="20" cy="18" r="2" fill="#f5e642" opacity=".7"/>
  </svg>
  <div style="color:#f59e0b;font-size:22px;font-weight:800;letter-spacing:-.5px">UstaYapı</div>
  <div class="spin"></div>
  <div style="color:#4a5568;font-size:12px">Yükleniyor...</div>
</div>
<div id="app"></div>

<script type="module">
import{h,render,Fragment}from'https://esm.sh/preact@10';
import{useState,useMemo,useEffect,useRef,useCallback}from'https://esm.sh/preact@10/hooks';
import{html}from'https://esm.sh/htm@3/preact';

// ── CONSTANTS ─────────────────────────────────────────────────
const CATS=[
  {id:"boru",name:"Boru & Bağlantı",icon:"🔧"},
  {id:"elektrik",name:"Elektrik",icon:"⚡"},
  {id:"alet",name:"El Aletleri",icon:"🔨"},
  {id:"hirdavat",name:"Hırdavat & Vida",icon:"🔩"},
  {id:"yapi",name:"Yapı Malzemeleri",icon:"🏗️"},
  {id:"kimya",name:"Kimyasallar",icon:"🧪"},
  {id:"boya",name:"Boya & Badana",icon:"🎨"},
  {id:"tesisat",name:"Isıtma & Tesisat",icon:"🌡️"},
  {id:"diger",name:"Diğer",icon:"📋"},
];
const UNITS=["adet","metre","cm","mm","kg","gram","litre","ml","çuval","kutu","paket","rulo","ton","takım","set","çift","koli","top"];
const STAFF=[
  {id:"admin",name:"Yönetici",username:"admin",password:"1234",role:"admin"},
  {id:"k1",name:"Ahmet (Kasiyer)",username:"ahmet",password:"1234",role:"kasiyer"},
  {id:"k2",name:"Fatma (Kasiyer)",username:"fatma",password:"1234",role:"kasiyer"},
];

// ── HELPERS ───────────────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const tl=n=>new Intl.NumberFormat("tr-TR",{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0)+" ₺";
const dt=s=>{const d=new Date(s);return d.toLocaleDateString("tr-TR")+" "+d.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"})};
const dShort=s=>new Date(s).toLocaleDateString("tr-TR",{day:"2-digit",month:"2-digit"});
const isToday=s=>s?.slice(0,10)===new Date().toISOString().slice(0,10);
const isMonth=s=>s?.slice(0,7)===new Date().toISOString().slice(0,7);
const catOf=id=>CATS.find(c=>c.id===id)||{name:id,icon:"📦"};
const mar=(s,b)=>b>0?((s-b)/b*100).toFixed(0):0;
const ls=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}};
const lsw=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
const LOGO=html`<svg width="38" height="38" viewBox="0 0 80 80" fill="none">
  <rect width="80" height="80" rx="18" fill="#0d3d4f"/>
  <rect x="22" y="38" width="36" height="24" rx="2" fill="#b08030"/>
  <rect x="18" y="32" width="44" height="8" rx="2" fill="#c9952a"/>
  <rect x="26" y="42" width="8" height="7" rx="1" fill="#e8c96a"/>
  <rect x="46" y="42" width="8" height="7" rx="1" fill="#e8c96a"/>
  <rect x="34" y="50" width="12" height="12" rx="1" fill="#7a5520"/>
  <path d="M12 28 Q8 24 10 19 L13 22 L16 19 Q20 21 18 26 L14 30Z" fill="#f5a623"/>
  <rect x="56" y="18" width="14" height="6" rx="2" fill="#f5a623" transform="rotate(-35 56 18)"/>
  <rect x="64" y="20" width="3" height="14" rx="1" fill="#f5a623" transform="rotate(-35 64 20)"/>
  <circle cx="40" cy="67" r="5" fill="none" stroke="#f5a623" stroke-width="2.5"/>
  <circle cx="20" cy="18" r="2" fill="#f5e642" opacity=".7"/>
</svg>`;

// ── GITHUB ────────────────────────────────────────────────────
async function ghLoad(cfg){
  const r=await fetch(`https://raw.githubusercontent.com/${cfg.owner}/${cfg.repo}/main/data.json?t=${Date.now()}`);
  if(!r.ok)throw new Error("GitHub veri yüklenemedi");
  return r.json();
}
async function ghSave(cfg,data){
  const hdrs={"Authorization":`token ${cfg.token}`,"Content-Type":"application/json","User-Agent":"UstaYapi-PWA"};
  const m=await(await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/data.json`,{headers:hdrs})).json();
  if(!m.sha)throw new Error("SHA alınamadı");
  const res=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/data.json`,{
    method:"PUT",headers:hdrs,
    body:JSON.stringify({message:"UstaYapı güncellendi",content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),sha:m.sha})
  });
  if(!res.ok)throw new Error("Kayıt hatası: "+(await res.json()).message);
}

// ── MODAL ─────────────────────────────────────────────────────
function Modal({title,onClose,children,maxWidth=540}){
  return html`<div class="modal-bg" onClick=${e=>e.target===e.currentTarget&&onClose()}>
    <div class="modal" style="max-width:${maxWidth}px">
      <div class="modal-hd">
        <span style="font-size:16px;font-weight:800">${title}</span>
        <button class="btn btn-ghost btn-sm" onClick=${onClose} style="font-size:20px;padding:4px 10px">×</button>
      </div>
      <div class="modal-bd">${children}</div>
    </div>
  </div>`;
}

// ── CONFIRM ───────────────────────────────────────────────────
function Confirm({title,msg,onOk,onCancel}){
  return html`<div class="modal-bg">
    <div class="modal" style="max-width:340px;text-align:center">
      <div class="modal-bd" style="padding:32px">
        <div style="font-size:42px;margin-bottom:12px">🗑️</div>
        <h3 style="font-size:17px;font-weight:800;margin-bottom:8px">${title}</h3>
        <p style="color:#7a8ba8;font-size:14px;margin-bottom:24px;line-height:1.6">${msg}</p>
        <div class="flex gap8" style="justify-content:center">
          <button class="btn btn-ghost btn-md" style="min-width:100px" onClick=${onCancel}>İptal</button>
          <button class="btn btn-danger btn-md" style="min-width:120px" onClick=${onOk}>🗑️ Evet, Sil</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ── GITHUB SETUP ──────────────────────────────────────────────
function GHSetup({onSave,onSkip}){
  const [owner,setOwner]=useState('');
  const [repo,setRepo]=useState('');
  const [token,setToken]=useState('');
  const [status,setStatus]=useState('');
  const test=async()=>{
    if(!owner||!repo||!token){setStatus('⚠️ Tüm alanları doldurun!');return}
    setStatus('⏳ Test ediliyor...');
    try{
      const r=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data.json`,{headers:{"Authorization":`token ${token}`,"User-Agent":"UstaYapi"}});
      if(!r.ok)throw new Error('Repo bulunamadı veya token hatalı');
      onSave({owner,repo,token});
    }catch(e){setStatus('❌ '+e.message)}
  };
  return html`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
    <div class="card" style="max-width:400px;width:100%">
      <div style="text-align:center;margin-bottom:20px">
        ${LOGO}
        <h2 style="color:#f59e0b;font-size:22px;font-weight:800;margin:10px 0 4px">UstaYapı</h2>
        <p style="color:#4a5568;font-size:13px">GitHub ile veri senkronizasyonu (opsiyonel)</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="field"><label>GitHub Kullanıcı Adı</label><input class="inp" value=${owner} onInput=${e=>setOwner(e.target.value)} placeholder="kullanici-adi"/></div>
        <div class="field"><label>Repository Adı</label><input class="inp" value=${repo} onInput=${e=>setRepo(e.target.value)} placeholder="ustayapi-data"/></div>
        <div class="field"><label>Personal Access Token</label><input class="inp" type="password" value=${token} onInput=${e=>setToken(e.target.value)} placeholder="ghp_xxxxxxxxxxxx"/></div>
        <div style="background:rgba(79,156,249,.08);border:1px solid rgba(79,156,249,.25);border-radius:10px;padding:12px 14px;font-size:12px;color:#7a8ba8;line-height:1.7">
          <strong style="color:#4f9cf9">Token:</strong> github.com → Settings → Developer settings → Personal access tokens → <em>repo</em> yetkisi
        </div>
        ${status&&html`<p style="font-size:13px;text-align:center;color:${status.includes('✅')?'#10d98a':status.includes('❌')?'#f05252':'#f59e0b'}">${status}</p>`}
        <button class="btn btn-primary btn-md btn-full" onClick=${test}>🔗 Bağlan ve Başla</button>
        <button onClick=${onSkip} style="background:none;border:none;color:#4a5568;font-size:13px;cursor:pointer;padding:8px;text-decoration:underline">
          GitHub olmadan devam et (sadece bu cihaz)
        </button>
      </div>
    </div>
  </div>`;
}

// ── LOGIN ─────────────────────────────────────────────────────
function Login({onLogin}){
  const [u,setU]=useState('');const [p,setP]=useState('');const [err,setErr]=useState('');
  const go=()=>{const s=STAFF.find(x=>x.username===u&&x.password===p);if(s){setErr('');onLogin(s)}else setErr('Kullanıcı adı veya şifre hatalı!')};
  return html`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
    <div class="card" style="max-width:340px;width:100%;text-align:center">
      <div style="display:flex;justify-content:center;margin-bottom:14px">${LOGO}</div>
      <h1 style="color:#f59e0b;font-size:24px;font-weight:800;margin-bottom:4px;letter-spacing:-.5px">UstaYapı</h1>
      <p style="color:#4a5568;font-size:12px;margin-bottom:28px">Stok & Müşteri Yönetim Sistemi</p>
      <div style="display:flex;flex-direction:column;gap:14px;text-align:left">
        <div class="field"><label>Kullanıcı Adı</label><input class="inp" value=${u} onInput=${e=>{setU(e.target.value);setErr('')}} placeholder="kullanici" onKeyDown=${e=>e.key==='Enter'&&go()}/></div>
        <div class="field"><label>Şifre</label><input class="inp" type="password" value=${p} onInput=${e=>{setP(e.target.value);setErr('')}} placeholder="••••" onKeyDown=${e=>e.key==='Enter'&&go()}/></div>
        ${err&&html`<p style="color:#f05252;font-size:13px;text-align:center">${err}</p>`}
        <button class="btn btn-primary btn-md btn-full" style="margin-top:4px" onClick=${go}>🔐 Giriş Yap</button>
      </div>
      <p style="color:#4a5568;font-size:11px;margin-top:20px">admin/1234 · ahmet/1234</p>
    </div>
  </div>`;
}

// ── URUN MODAL ────────────────────────────────────────────────
function UrunModal({product,suppliers,onSave,onClose}){
  const [f,setF]=useState({
    code:product?.code||'',name:product?.name||'',cat:product?.cat||'hirdavat',
    stock:String(product?.stock??0),minStock:String(product?.minStock??5),
    buyPrice:String(product?.buyPrice||''),sellPrice:String(product?.sellPrice||''),
    unit:product?.unit||'adet',supplierId:product?.supplierId||'',image:product?.image||''
  });
  const up=(k,v)=>setF(x=>({...x,[k]:v}));
  const m=f.buyPrice&&f.sellPrice&&Number(f.buyPrice)>0?((Number(f.sellPrice)-Number(f.buyPrice))/Number(f.buyPrice)*100).toFixed(0):null;
  const submit=()=>{
    if(!f.name.trim())return alert('Ürün adı zorunludur!');
    if(!f.sellPrice)return alert('Satış fiyatı zorunludur!');
    onSave({...f,stock:Number(f.stock)||0,minStock:Number(f.minStock)||0,buyPrice:Number(f.buyPrice)||0,sellPrice:Number(f.sellPrice)});
  };
  return html`<${Modal} title=${product?'✏️ Ürün Düzenle':'📦 Yeni Ürün'} onClose=${onClose} maxWidth=${600}>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="grid2">
        <div class="field"><label>Stok Kodu</label><input class="inp" value=${f.code} onInput=${e=>up('code',e.target.value)} placeholder="BRU001"/></div>
        <div class="field"><label>Ürün Adı *</label><input class="inp" value=${f.name} onInput=${e=>up('name',e.target.value)} placeholder="Ürün adı..."/></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Kategori</label><select class="sel" value=${f.cat} onChange=${e=>up('cat',e.target.value)}>${CATS.map(c=>html`<option value=${c.id}>${c.icon} ${c.name}</option>`)}</select></div>
        <div class="field"><label>Birim</label><select class="sel" value=${f.unit} onChange=${e=>up('unit',e.target.value)}>${UNITS.map(u=>html`<option value=${u}>${u}</option>`)}</select></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Mevcut Stok</label><input class="inp" type="number" min="0" value=${f.stock} onInput=${e=>up('stock',e.target.value)}/></div>
        <div class="field"><label>Min. Uyarı Seviyesi</label><input class="inp" type="number" min="0" value=${f.minStock} onInput=${e=>up('minStock',e.target.value)}/></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Alış Fiyatı (₺)</label><input class="inp" type="number" min="0" step=".01" value=${f.buyPrice} onInput=${e=>up('buyPrice',e.target.value)} placeholder="0.00"/></div>
        <div class="field"><label>Satış Fiyatı (₺) *</label><input class="inp" type="number" min="0" step=".01" value=${f.sellPrice} onInput=${e=>up('sellPrice',e.target.value)} placeholder="0.00"/></div>
      </div>
      ${m!==null&&html`<div style="background:${Number(m)>=20?'rgba(16,217,138,.08)':Number(m)>=10?'rgba(245,158,11,.09)':'rgba(240,82,82,.08)'};border:1px solid ${Number(m)>=20?'rgba(16,217,138,.25)':Number(m)>=10?'rgba(245,158,11,.28)':'rgba(240,82,82,.25)'};border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
        <span style="color:#7a8ba8;font-size:13px">Kâr Marjı</span>
        <span style="font-size:17px;font-weight:800;color:${Number(m)>=20?'#10d98a':Number(m)>=10?'#f59e0b':'#f05252'}">%${m} · ${tl(Number(f.sellPrice)-Number(f.buyPrice))}/birim</span>
      </div>`}
      <div class="field"><label>Resim URL (opsiyonel)</label><input class="inp" value=${f.image} onInput=${e=>up('image',e.target.value)} placeholder="https://...jpg"/></div>
      ${f.image&&html`<img src=${f.image} alt="Ürün" style="width:72px;height:72px;object-fit:cover;border-radius:10px;border:1px solid #1b2438" onError=${e=>e.target.style.display='none'}/>`}
      <div class="field"><label>Tedarikçi</label><select class="sel" value=${f.supplierId} onChange=${e=>up('supplierId',e.target.value)}><option value="">— Seçiniz —</option>${suppliers.map(s=>html`<option value=${s.id}>${s.name}</option>`)}</select></div>
      <div class="flex gap8" style="justify-content:flex-end;margin-top:4px">
        <button class="btn btn-ghost btn-md" onClick=${onClose}>İptal</button>
        <button class="btn btn-primary btn-md" onClick=${submit}>💾 Kaydet</button>
      </div>
    </div>
  </${Modal}>`;
}

// ── MÜŞTERİ MODAL ────────────────────────────────────────────
function MusteriModal({onSave,onClose}){
  const [n,setN]=useState('');const [p,setP]=useState('');const [a,setA]=useState('');const [nt,setNt]=useState('');const [err,setErr]=useState('');
  const submit=()=>{if(!n.trim()){setErr('Ad zorunludur!');return} onSave({name:n.trim(),phone:p,address:a,note:nt})};
  return html`<${Modal} title="👤 Yeni Müşteri Ekle" onClose=${onClose}>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="field">
        <label>Ad Soyad / Firma Adı *</label>
        <input class="inp" value=${n} onInput=${e=>{setN(e.target.value);setErr('')}} placeholder="Ahmet Yılmaz veya Kadir İnşaat Ltd." onKeyDown=${e=>e.key==='Enter'&&submit()}/>
        ${err&&html`<span style="color:#f05252;font-size:12px">${err}</span>`}
      </div>
      <div class="field"><label>Telefon</label><input class="inp" value=${p} onInput=${e=>setP(e.target.value)} placeholder="0532 XXX XX XX" onKeyDown=${e=>e.key==='Enter'&&submit()}/></div>
      <div class="field"><label>Adres</label><input class="inp" value=${a} onInput=${e=>setA(e.target.value)} placeholder="Mahalle, ilçe, şehir..."/></div>
      <div class="field"><label>Not (opsiyonel)</label><input class="inp" value=${nt} onInput=${e=>setNt(e.target.value)} placeholder="Müşteri hakkında not..."/></div>
      <div style="background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.28);border-radius:10px;padding:10px 14px;font-size:12px;color:#7a8ba8">
        💡 Telefon numarası WhatsApp fiş paylaşımında kullanılır.
      </div>
      <div class="flex gap8" style="justify-content:flex-end">
        <button class="btn btn-ghost btn-md" onClick=${onClose}>İptal</button>

      </div>
    </div>

}

// ── SATIŞ MODAL ───────────────────────────────────────────────
function SatisModal({products,customer,onSave,onClose}){
  const [rows,setRows]=useState([{pid:'',qty:'1'}]);
  const [discVal,setDiscVal]=useState('0');const [discType,setDiscType]=useState('tl');const [note,setNote]=useState('');const [bc,setBc]=useState('');
  const upd=(i,k,v)=>setRows(r=>r.map((x,j)=>j===i?{...x,[k]:v}:x));
  const addByCode=code=>{const p=products.find(x=>x.code===code.trim().toUpperCase()||x.name.toLowerCase().includes(code.toLowerCase()));if(p){setRows(r=>[...r,{pid:p.id,qty:'1'}]);setBc('')}else alert('Bulunamadı: '+code)};
  const sub=rows.reduce((s,r)=>{const p=products.find(x=>x.id===r.pid);return s+(p?p.sellPrice*Number(r.qty||0):0)},0);
  const disc=discType==='pct'?sub*(Number(discVal)||0)/100:(Number(discVal)||0);
  const total=Math.max(sub-disc,0);
  const profit=rows.reduce((s,r)=>{const p=products.find(x=>x.id===r.pid);return s+(p?(p.sellPrice-p.buyPrice)*Number(r.qty||0):0)},0)-disc;
  const submit=()=>{
    const valid=rows.filter(r=>r.pid&&Number(r.qty)>0);
    if(!valid.length)return alert('En az bir ürün seçiniz!');
    for(const r of valid){const p=products.find(x=>x.id===r.pid);if(p&&Number(r.qty)>p.stock)return alert(`"${p.name}" stok yetersiz! (${p.stock} ${p.unit})`)}
    const items=valid.map(r=>{const p=products.find(x=>x.id===r.pid);return{productId:p.id,name:p.name,qty:Number(r.qty),sellPrice:p.sellPrice,buyPrice:p.buyPrice,unit:p.unit}});
    onSave(items,total,disc,note);
  };
  return html`<${Modal} title=${`🛒 Satış — ${customer.name}`} onClose=${onClose} maxWidth=${680}>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="field">
        <label>🏷️ Kod / Barkod ile Ekle</label>
        <div class="flex gap8">
          <input class="inp" value=${bc} onInput=${e=>setBc(e.target.value)} placeholder="Ürün kodu veya adı gir, Enter..." onKeyDown=${e=>e.key==='Enter'&&bc&&addByCode(bc)}/>
          <button class="btn btn-blue btn-md" style="white-space:nowrap" onClick=${()=>bc&&addByCode(bc)}>Ekle</button>
        </div>
      </div>
      ${rows.map((row,i)=>{const p=products.find(x=>x.id===row.pid);return html`
        <div style="display:grid;grid-template-columns:1fr 88px 88px 32px;gap:8px;align-items:end">
          <div class="field">
            ${i===0&&html`<label>Ürün</label>`}
            <select class="sel" value=${row.pid} onChange=${e=>upd(i,'pid',e.target.value)}>
              <option value="">— Seçiniz —</option>
              ${CATS.map(cat=>{const ps=products.filter(pr=>pr.cat===cat.id&&pr.stock>0);if(!ps.length)return null;
                return html`<optgroup label=${cat.icon+' '+cat.name}>${ps.map(pr=>html`<option value=${pr.id}>${pr.name} (${pr.stock} ${pr.unit}) — ${tl(pr.sellPrice)}</option>`)}</optgroup>`})}
            </select>
          </div>
          <div class="field">
            ${i===0&&html`<label>Miktar</label>`}
            <input class="inp" type="number" min="1" value=${row.qty} onInput=${e=>upd(i,'qty',e.target.value)}/>
          </div>
          <div>
            ${i===0&&html`<div style="font-size:11px;color:#4a5568;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Tutar</div>`}
            <div style="color:#f59e0b;font-weight:700;font-size:14px;padding:10px 0">${p?tl(p.sellPrice*Number(row.qty||0)):'-'}</div>
          </div>
          <button onClick=${()=>setRows(r=>r.filter((_,j)=>j!==i))} style="background:rgba(240,82,82,.08);color:#f05252;border:none;border-radius:8px;padding:0 8px;cursor:pointer;height:40px;align-self:end;margin-top:${i===0?22:0}px">×</button>
        </div>`})}
      <button class="btn btn-ghost btn-sm" style="align-self:flex-start" onClick=${()=>setRows(r=>[...r,{pid:'',qty:'1'}])}>+ Satır Ekle</button>
      <div class="grid2">
        <div class="field"><label>İndirim</label><input class="inp" type="number" min="0" step=".01" value=${discVal} onInput=${e=>setDiscVal(e.target.value)}/></div>
        <div class="field"><label>Tür</label><select class="sel" value=${discType} onChange=${e=>setDiscType(e.target.value)}><option value="tl">₺ TL</option><option value="pct">% Yüzde</option></select></div>
      </div>
      <div class="field"><label>Not</label><input class="inp" value=${note} onInput=${e=>setNote(e.target.value)} placeholder="Satış notu..."/></div>
      <div style="background:rgba(255,255,255,.02);border:1px solid #1b2438;border-radius:12px;padding:14px">
        <div class="row" style="font-size:13px;color:#7a8ba8;margin-bottom:5px"><span>Ara Toplam</span><span style="font-family:monospace">${tl(sub)}</span></div>
        ${disc>0&&html`<div class="row" style="font-size:13px;color:#f05252;margin-bottom:5px"><span>İndirim</span><span style="font-family:monospace">−${tl(disc)}</span></div>`}
        <div style="border-top:1px solid #1b2438;margin:8px 0"></div>
        <div class="row"><span style="font-weight:800;font-size:15px">TOPLAM</span><span style="font-weight:800;color:#f59e0b;font-size:22px;font-family:monospace">${tl(total)}</span></div>
        <div class="row" style="font-size:12px;color:${profit>=0?'#10d98a':'#f05252'};margin-top:5px"><span>Kâr</span><span style="font-weight:700;font-family:monospace">${tl(profit)}</span></div>
      </div>
      <div class="flex gap8" style="justify-content:flex-end">
        <button class="btn btn-ghost btn-md" onClick=${onClose}>İptal</button>
        <button class="btn btn-primary btn-md" onClick=${submit}>✅ Satışı Onayla</button>
      </div>
    </div>
  </${Modal}>`;
}

// ── ÖDEME MODAL ───────────────────────────────────────────────
function OdemeModal({title,balance,balLabel,balColor,onSave,onClose}){
  const [amt,setAmt]=useState(balance>0?balance.toFixed(2):'');const [meth,setMeth]=useState('nakit');const [note,setNote]=useState('');

  return html`<${Modal} title=${title} onClose=${onClose}>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div style="background:${balColor}10;border:1px solid ${balColor}30;border-radius:12px;padding:14px 18px">
        <div style="font-size:11px;color:#4a5568;font-weight:700;text-transform:uppercase;margin-bottom:4px">${balLabel}</div>
        <div style="font-size:24px;font-weight:800;color:${balColor};font-family:monospace">${balance>0?tl(balance):'Bakiye Yok'}</div>
      </div>
      <div class="field"><label>Tutar (₺)</label><input class="inp" type="number" min=".01" step=".01" value=${amt} onInput=${e=>setAmt(e.target.value)} placeholder="0.00"/></div>
      <div class="field"><label>Yöntem</label><select class="sel" value=${meth} onChange=${e=>setMeth(e.target.value)}>${['nakit','havale','EFT','çek','kredi kartı','diğer'].map(m=>html`<option value=${m}>${m}</option>`)}</select></div>
      <div class="field"><label>Not</label><input class="inp" value=${note} onInput=${e=>setNote(e.target.value)} placeholder="Ek not..."/></div>
      <div class="flex gap8" style="justify-content:flex-end">
        <button class="btn btn-ghost btn-md" onClick=${onClose}>İptal</button>
        <button class="btn btn-success btn-md" onClick=${submit}>💰 Kaydet</button>

    </div>
  </${Modal}>`;
}

// ── FİŞ MODAL ─────────────────────────────────────────────────
function FisModal({tx,customer,balance,onClose}){
  const isSale=tx.type==='sale';
  const doPrint=()=>{
    const s=document.createElement('style');s.id='ps';
    s.textContent='@media print{body>*{display:none!important}#print-area{display:block!important;position:fixed;top:0;left:0;width:100%;}}';
    document.head.appendChild(s);window.print();
    setTimeout(()=>document.getElementById('ps')?.remove(),1000);
  };
  const shareWA=()=>{
    const raw=customer.phone?.replace(/\D/g,'')||'';
    const phone=raw.startsWith('0')?'90'+raw.slice(1):raw.startsWith('90')?raw:raw?'90'+raw:'';
    const lines=['🔧 *UstaYapı Mağazası*','━━━━━━━━━━━━━━━',`📅 ${dt(tx.date)}`,`👤 ${customer.name}`,customer.phone?`📞 ${customer.phone}`:'','━━━━━━━━━━━━━━━',
      isSale?'🛒 *SATIŞ FİŞİ*':'💰 *ÖDEME MAKBUZU*','',
      ...(isSale&&tx.items?tx.items.map(it=>`• ${it.name}\n  ${it.qty} ${it.unit} × ${tl(it.sellPrice)} = *${tl(it.qty*it.sellPrice)}*`):[]),
      '',isSale&&tx.discount>0?`📉 İndirim: −${tl(tx.discount)}`:'',
      `💵 *${isSale?'TOPLAM':'ÖDEME'}: ${tl(tx.amount)}*`,
      `📊 *Bakiye: ${balance>0?tl(balance)+' BORÇ':balance<0?tl(Math.abs(balance))+' ALACAK':'Temiz ✓'}*`,
      tx.note?`📝 ${tx.note}`:'','━━━━━━━━━━━━━━━','Teşekkür ederiz! 🙏 UstaYapı'
    ].filter(Boolean).join('\n');
    window.open((phone?`https://wa.me/${phone}`:'https://wa.me/')+`?text=${encodeURIComponent(lines)}`,'_blank');
  };
  return html`<${Modal} title="🖨️ Fiş / Makbuz" onClose=${onClose} maxWidth=${460}>
    <div>
      <div id="print-area" style="background:#fff;color:#111;border-radius:12px;padding:24px;font-family:'Courier New',monospace;font-size:13px;line-height:1.9;margin-bottom:16px">
        <div style="text-align:center;font-weight:900;font-size:15px;margin-bottom:4px">🔧 UstaYapı Mağazası</div>
        <div style="border-top:2px dashed #ccc;margin:8px 0"></div>
        <div>📅 ${dt(tx.date)}</div><div>👤 ${customer.name}</div>
        ${customer.phone&&html`<div>📞 ${customer.phone}</div>`}
        ${customer.address&&html`<div>📍 ${customer.address}</div>`}
        <div style="border-top:2px dashed #ccc;margin:8px 0"></div>
        <div style="font-weight:800;font-size:14px;margin-bottom:8px">${isSale?'🛒 SATIŞ FİŞİ':'💰 ÖDEME MAKBUZU'}</div>
        ${isSale&&tx.items?.map((it,i)=>html`<div key=${i} style="margin-bottom:6px">
          <div style="font-weight:700">▸ ${it.name}</div>
          <div style="padding-left:14px;color:#555;font-size:12px">${it.qty} ${it.unit} × ${tl(it.sellPrice)} = <strong>${tl(it.qty*it.sellPrice)}</strong></div>
        </div>`)}
        <div style="border-top:2px dashed #ccc;margin:8px 0"></div>
        ${isSale&&tx.discount>0&&html`<div style="display:flex;justify-content:space-between;color:#c00;font-size:13px"><span>İndirim:</span><span>−${tl(tx.discount)}</span></div>`}
        <div style="display:flex;justify-content:space-between;font-weight:800;font-size:15px"><span>${isSale?'TOPLAM:':'ÖDEME:'}</span><span>${tl(tx.amount)}</span></div>
        <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:13px">
          <span>BAKİYE:</span>
          <span style="color:${balance>0?'#c00':balance<0?'#060':'#000'};font-weight:700">${balance>0?tl(balance)+' BORÇ':balance<0?tl(Math.abs(balance))+' ALACAK':'Temiz ✓'}</span>
        </div>
        ${tx.note&&html`<div style="margin-top:6px;font-size:12px;color:#888">Not: ${tx.note}</div>`}
        <div style="border-top:2px dashed #ccc;margin:8px 0"></div>
        <div style="text-align:center;font-size:12px;color:#999">Teşekkür ederiz 🙏 İyi çalışmalar!</div>
      </div>
      <div class="flex gap8" style="margin-bottom:8px">
        <button class="btn btn-blue btn-md btn-full" onClick=${doPrint}>🖨️ Yazdır / PDF</button>
        <button class="btn btn-success btn-md btn-full" onClick=${shareWA}>📱 WhatsApp</button>
      </div>
      <button class="btn btn-ghost btn-md btn-full" onClick=${onClose}>Kapat</button>
    </div>
  </${Modal}>`;
}

    dost:`Merhaba ${cust.name.split(' ')[0]} 👋\n\nHesabında ${tl(balance)} bakiye var, uygun bir zamanda geçersen seviniriz 😊\n\nUstaYapı Ailesi 🔧`,

        <span style="color:#7a8ba8;font-size:13px">${cust.name}</span>
        <span style="color:#f05252;font-weight:800;font-family:monospace">${tl(balance)} BORÇ</span>
      </div>
      <div class="field"><label>Mesaj Tonu</label>
        <div class="flex gap8">
          ${[{id:'nazik',l:'🤝 Nazik'},{id:'resmi',l:'📋 Resmi'},{id:'dost',l:'😊 Samimi'}].map(t=>html`
            <button onClick=${()=>setTip(t.id)} style="flex:1;padding:8px;border-radius:10px;border:1px solid ${tip===t.id?'rgba(245,158,11,.28)':'#1b2438'};background:${tip===t.id?'rgba(245,158,11,.09)':'transparent'};color:${tip===t.id?'#f59e0b':'#7a8ba8'};font-size:12px;font-weight:${tip===t.id?700:500};cursor:pointer">${t.l}</button>`)}
        </div>
      </div>
      <div style="background:#07090f;border:1px solid #1b2438;border-radius:12px;padding:14px;font-size:13px;color:#e8edf5;line-height:1.8;white-space:pre-wrap;min-height:120px">${msg}</div>

        <button class="btn btn-ghost btn-md btn-full" onClick=${()=>{navigator.clipboard?.writeText(msg);alert('Kopyalandı!')}}>📋 Kopyala</button>
        <button class="btn btn-success btn-md btn-full" onClick=${()=>window.open((phone?`https://wa.me/${phone}`:'https://wa.me/')+`?text=${encodeURIComponent(msg)}`,'_blank')}>📱 WhatsApp</button>
      </div>
    </div>
  </${Modal}>`;
}

// ── MÜŞTERİ DETAY ────────────────────────────────────────────
function MusteriDetay({cust,txList,balance,custBal,onBack,onSatis,onOdeme,onFis,onDelete,onHatirlatma}){
  const [filTip,setFilTip]=useState('hepsi');const [d1,setD1]=useState('');const [d2,setD2]=useState('');const [showFil,setShowFil]=useState(false);
  const filtered=txList.filter(t=>(filTip==='hepsi'||t.type===filTip)&&(!d1||t.date.slice(0,10)>=d1)&&(!d2||t.date.slice(0,10)<=d2));
  const sorted=[...txList].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let run=0;const rbMap=Object.fromEntries(sorted.map(t=>{run+=t.type==='sale'?t.amount:-t.amount;return[t.id,run]}));
  const displayed=[...filtered].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const tS=txList.filter(t=>t.type==='sale').reduce((s,t)=>s+t.amount,0);
  const tP=txList.filter(t=>t.type==='payment').reduce((s,t)=>s+t.amount,0);
  const hasF=filTip!=='hepsi'||d1||d2;
  return html`<div>
    <button style="background:none;border:none;color:#4a5568;cursor:pointer;font-size:13px;margin-bottom:18px;padding:0;display:flex;align-items:center;gap:6px" onClick=${onBack}>← Müşterilere Dön</button>

      <div class="row" style="flex-wrap:wrap;gap:14px;align-items:flex-start">

          <div style="width:52px;height:52px;border-radius:50%;background:rgba(245,158,11,.09);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#f59e0b;flex-shrink:0">${cust.name.charAt(0)}</div>
          <div>
            <h2 style="font-size:18px;font-weight:800;margin:0">${cust.name}</h2>
            ${cust.phone&&html`<div style="color:#4a5568;font-size:13px;margin-top:3px">📞 ${cust.phone}</div>`}
            ${cust.address&&html`<div style="color:#4a5568;font-size:13px">📍 ${cust.address}</div>`}
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;color:#4a5568;text-transform:uppercase;font-weight:700;letter-spacing:.5px">Bakiye</div>
          <div style="font-size:26px;font-weight:800;color:${balance>0?'#f05252':balance<0?'#10d98a':'#4a5568'};font-family:monospace">${tl(Math.abs(balance))}</div>
          <span class="badge" style="background:${balance>0?'rgba(240,82,82,.08)':balance<0?'rgba(16,217,138,.08)':'rgba(74,85,104,.15)'};color:${balance>0?'#f05252':balance<0?'#10d98a':'#4a5568'}">${balance>0?'BORÇ':balance<0?'ALACAK':'Temiz'}</span>
        </div>
      </div>
      <div class="grid3" style="margin-top:14px">
        ${[{l:'Toplam Satış',v:tl(tS),c:'#f05252'},{l:'Toplam Ödeme',v:tl(tP),c:'#10d98a'},{l:'İşlem',v:txList.length,c:'#f59e0b'}].map(({l,v,c})=>html`
          <div style="text-align:center;background:#07090f;border-radius:10px;padding:9px 0">
            <div style="font-size:10px;color:#4a5568;text-transform:uppercase;font-weight:700">${l}</div>
            <div style="font-size:14px;font-weight:800;color:${c};font-family:monospace">${v}</div>
          </div>`)}
      </div>
      <div class="flex gap8" style="margin-top:14px;flex-wrap:wrap">
        <button class="btn btn-primary btn-md" onClick=${onSatis}>🛒 Satış Yap</button>
        <button class="btn btn-success btn-md" onClick=${onOdeme}>💰 Ödeme Al</button>
        ${balance>0&&html`<button class="btn btn-purple btn-md" onClick=${onHatirlatma}>💬 Hatırlatma</button>`}
        ${onDelete&&html`<button class="btn btn-danger btn-md" onClick=${onDelete}>🗑️ Sil</button>`}
      </div>
    </div>
    <div class="row" style="margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <h3 style="font-size:15px;font-weight:700;margin:0">Hesap Hareketleri ${hasF&&html`<span style="font-size:12px;color:#f59e0b">(${displayed.length}/${txList.length})</span>`}</h3>
      <div class="flex gap6">
        ${hasF&&html`<button onClick=${()=>{setFilTip('hepsi');setD1('');setD2('')}} style="background:rgba(240,82,82,.08);border:1px solid rgba(240,82,82,.25);border-radius:8px;padding:5px 10px;color:#f05252;font-size:11px;cursor:pointer">✕ Temizle</button>`}

function App(){
  const [ghCfg,setGhCfg]=useState(()=>ls('uy-gh',null));
  const [ghStatus,setGhStatus]=useState('idle');
  const [setupDone,setSetupDone]=useState(()=>ls('uy-setup',false));

  const [page,setPage]=useState('dashboard');
  const [selCustId,setSelCustId]=useState(null);
  const [modal,setModal]=useState(null);
  const [editProd,setEditProd]=useState(null);
  const [fisTx,setFisTx]=useState(null);
  const [confirmCfg,setConfirmCfg]=useState(null);
  const [hatCust,setHatCust]=useState(null);
  const [showNotif,setShowNotif]=useState(false);
  const [stokSearch,setStokSearch]=useState('');
  const [stokCat,setStokCat]=useState('all');
  const [custSearch,setCustSearch]=useState('');
  const [menuOpen,setMenuOpen]=useState(false);
  const [ww,setWw]=useState(window.innerWidth);

  const [products,setProducts]=useState([]);
  const [customers,setCustomers]=useState([]);
  const [suppliers,setSuppliers]=useState([]);
  const [custTx,setCustTx]=useState([]);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    const h=()=>setWw(window.innerWidth);
    window.addEventListener('resize',h);
    return()=>window.removeEventListener('resize',h);
  },[]);
  const mob=ww<768;

  // Load data on mount
  useEffect(()=>{(async()=>{
    let data=null;
    if(ghCfg){try{data=await ghLoad(ghCfg)}catch(e){console.warn('GitHub yüklenemedi')}}
    if(!data){const c=ls('uy-cache',null);if(c)data=c}
    if(!data){try{const r=await fetch('data.json');if(r.ok)data=await r.json()}catch{}}
    if(data){
      setProducts(data.products||[]);setCustomers(data.customers||[]);
      setSuppliers(data.suppliers||[]);setCustTx(data.transactions||[]);
      lsw('uy-cache',data);
    }
    setLoaded(true);
    const b=document.getElementById('boot');if(b){b.style.opacity='0';setTimeout(()=>b.style.display='none',400)}
  })()},[]);

  const persist=useCallback(async(np,nc,nt,ns)=>{
    const data={version:1,products:np??products,customers:nc??customers,suppliers:ns??suppliers,transactions:nt??custTx,lastUpdated:new Date().toISOString()};
    lsw('uy-cache',data);
    if(ghCfg){
      setGhStatus('saving');
      try{await ghSave(ghCfg,data);setGhStatus('saved');setTimeout(()=>setGhStatus('idle'),3000)}
      catch(e){console.error(e);setGhStatus('error');setTimeout(()=>setGhStatus('idle'),5000)}
    }
  },[products,customers,custTx,suppliers,ghCfg]);

  // Computed
  const custBal=useMemo(()=>{
    const b=Object.fromEntries(customers.map(c=>[c.id,0]));
    custTx.forEach(tx=>{b[tx.customerId]=(b[tx.customerId]||0)+(tx.type==='sale'?tx.amount:-tx.amount)});
    return b;
  },[customers,custTx]);
  const todaySales=useMemo(()=>custTx.filter(t=>t.type==='sale'&&isToday(t.date)).reduce((s,t)=>s+t.amount,0),[custTx]);
  const monthSales=useMemo(()=>custTx.filter(t=>t.type==='sale'&&isMonth(t.date)).reduce((s,t)=>s+t.amount,0),[custTx]);
  const monthProfit=useMemo(()=>custTx.filter(t=>t.type==='sale'&&isMonth(t.date)).reduce((s,t)=>s+(t.items?.reduce((ps,it)=>(it.sellPrice-it.buyPrice)*it.qty+ps,0)||0)-(t.discount||0),0),[custTx]);
  const totalRec=useMemo(()=>Object.values(custBal).reduce((s,b)=>s+Math.max(b,0),0),[custBal]);
  const stockVal=useMemo(()=>products.reduce((s,p)=>s+p.stock*p.buyPrice,0),[products]);
  const lowStock=products.filter(p=>p.stock<=p.minStock);
  const selCust=customers.find(c=>c.id===selCustId);
  const selCustBal=selCustId?(custBal[selCustId]||0):0;
  const isAdmin=user?.role==='admin';

  // Actions

    </div>`}

    <!-- MODALS -->
    ${modal==='urun'&&html`<${UrunModal} product=${editProd} suppliers=${suppliers} onSave=${saveProd} onClose=${()=>{setModal(null);setEditProd(null)}}/>`}
    ${modal==='musteri'&&html`<${MusteriModal} onSave=${saveCust} onClose=${()=>setModal(null)}/>`}
    ${modal==='satis'&&selCust&&html`<${SatisModal} products=${products} customer=${selCust} onSave=${makeSale} onClose=${()=>setModal(null)}/>`}
    ${modal==='cust-odeme'&&selCust&&html`<${OdemeModal} title=${`💰 Ödeme Al — ${selCust.name}`} balance=${selCustBal} balLabel="Müşteri Borcu" balColor="#f05252" onSave=${makePay} onClose=${()=>setModal(null)}/>`}
    ${modal==='fis'&&fisTx&&selCust&&html`<${FisModal} tx=${fisTx} customer=${selCust} balance=${custBal[selCust.id]||0} onClose=${()=>setModal(null)}/>`}
    ${modal==='gunluk'&&html`<${GunlukModal} custTx=${custTx} customers=${customers} onClose=${()=>setModal(null)}/>`}
    ${modal==='etiket'&&html`<${EtiketModal} products=${products} onClose=${()=>setModal(null)}/>`}
    ${hatCust&&html`<${BorcModal} cust=${hatCust} balance=${custBal[hatCust.id]||0} onClose=${()=>setHatCust(null)}/>`}
    ${confirmCfg&&html`<${Confirm} title=${confirmCfg.title} msg=${confirmCfg.msg} onOk=${confirmCfg.onOk} onCancel=${()=>setConfirmCfg(null)}/>`}
      </div>`;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>

    navigator.serviceWorker.register('sw.js?v=2')
      .then(() => console.log("PWA Hazır!"))
      .catch(err => console.log("Hata:", err));
  }
</script>
