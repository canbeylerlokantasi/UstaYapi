<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>UstaYapı Pro V3</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --bg: #07090f; --card: #0e1420; --primary: #f59e0b; --text: #e8edf5; --border: #1b2438; --danger: #ef4444; --success: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }
        .navbar { background: var(--card); padding: 12px; display: flex; justify-content: space-around; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-btn { background: none; border: none; color: #64748b; font-size: 1.5rem; cursor: pointer; }
        .nav-btn.active { color: var(--primary); }
        .container { padding: 15px; max-width: 600px; margin: auto; padding-bottom: 100px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-wa { background: var(--success); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        input, select { width: 100%; padding: 12px; background: #07090f; border: 1px solid var(--border); border-radius: 8px; color: #fff; margin-bottom: 10px; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
        .modal { background: var(--card); width: 100%; max-width: 450px; padding: 20px; border-radius: 16px; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }
        .search-box { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: #fff; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const MASTER_ADMIN = { user: "admin", pass: "1234" };
        const DEPO_PASS = "depo123";

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('customers'); // customers, sales, depo, reports
            const [data, setData] = useState({ products: [], customers: [], transactions: [] });
            const [isDepoAuth, setIsDepoAuth] = useState(false);
            const [modal, setModal] = useState(null);
            const [selectedItem, setSelectedItem] = useState(null);
            const [ghInfo, setGhInfo] = useState({ token: "", user: "", repo: "" });
            const [search, setSearch] = useState("");

            useEffect(() => {
                fetch('data.json').then(r => r.json()).then(setData).catch(() => {
                    // Varsayılan boş data yapısı
                    setData({ products: [], customers: [], transactions: [] });
                });
            }, []);

            const sync = async (newData) => {
                setData(newData);
                if (!ghInfo.token) return;
                // GitHub Kayıt Mantığı Buraya (API PUT)
            };

            const getBalance = (cId) => {
                return (data.transactions || []).filter(t => t.customerId === cId)
                    .reduce((s, t) => s + (t.type === 'satis' ? t.total : -t.total), 0);
            };

            // MODALLAR (Ekleme/Düzenleme Ekranları)
            const CustomerModal = () => {
                const [form, setForm] = useState(selectedItem || { id: "c"+Date.now(), name: "", phone: "" });
                return (
                    <div className="overlay"><div className="modal">
                        <h3>{selectedItem ? 'Düzenle' : 'Yeni Müşteri'}</h3>
                        <input placeholder="Ad Soyad" value={form.name} onInput={e=>setForm({...form, name: e.target.value})} />
                        <input placeholder="Telefon (90532...)" value={form.phone} onInput={e=>setForm({...form, phone: e.target.value})} />
                        <button className="btn btn-primary" onClick={() => {
                            const newList = selectedItem ? data.customers.map(c => c.id === form.id ? form : c) : [...data.customers, form];
                            sync({...data, customers: newList}); setModal(null);
                        }}>Kaydet</button>
                        {selectedItem && <button className="btn btn-danger" style={{marginTop:8}} onClick={() => {
                            sync({...data, customers: data.customers.filter(c=>c.id!==form.id)}); setModal(null);
                        }}>Müşteriyi Sil</button>}
                        <button className="btn btn-outline" style={{marginTop:8}} onClick={()=>setModal(null)}>Kapat</button>
                    </div></div>
                );
            };

            const ProductModal = () => {
                const [form, setForm] = useState(selectedItem || { id: "p"+Date.now(), name: "", stock: 0, sellPrice: 0, unit: "adet" });
                return (
                    <div className="overlay"><div className="modal">
                        <h3>{selectedItem ? 'Malzeme Düzenle' : 'Yeni Malzeme'}</h3>
                        <input placeholder="Malzeme Adı" value={form.name} onInput={e=>setForm({...form, name: e.target.value})} />
                        <input placeholder="Birim (Adet/Metre)" value={form.unit} onInput={e=>setForm({...form, unit: e.target.value})} />
                        <input type="number" placeholder="Stok" value={form.stock} onInput={e=>setForm({...form, stock: parseInt(e.target.value)})} />
                        <input type="number" placeholder="Satış Fiyatı" value={form.sellPrice} onInput={e=>setForm({...form, sellPrice: parseFloat(e.target.value)})} />
                        <button className="btn btn-primary" onClick={() => {
                            const newList = selectedItem ? data.products.map(p => p.id === form.id ? form : p) : [...data.products, form];
                            sync({...data, products: newList}); setModal(null);
                        }}>Kaydet</button>
                        {selectedItem && <button className="btn btn-danger" style={{marginTop:8}} onClick={() => {
                            sync({...data, products: data.products.filter(p=>p.id!==form.id)}); setModal(null);
                        }}>Malzemeyi Sil</button>}
                        <button className="btn btn-outline" style={{marginTop:8}} onClick={()=>setModal(null)}>Kapat</button>
                    </div></div>
                );
            };

            if (!user) return (
                <div className="overlay"><div className="modal">
                    <h2 style={{textAlign:'center', marginBottom:20}}>UstaYapı Giriş</h2>
                    <input id="u" placeholder="Kullanıcı Adı" /><input id="p" type="password" placeholder="Şifre" />
                    <button className="btn btn-primary" style={{marginTop:10}} onClick={() => {
                        const u = document.getElementById('u').value, p = document.getElementById('p').value;
                        if(u === MASTER_ADMIN.user && p === MASTER_ADMIN.pass) setUser(u); else alert("Hatalı!");
                    }}>Giriş</button>
                </div></div>
            );

            return (
                <div>
                    <nav className="navbar">
                        <button className={`nav-btn ${view==='customers'?'active':''}`} onClick={()=>setView('customers')}><i className="bi bi-people-fill"></i></button>
                        <button className={`nav-btn ${view==='sales'?'active':''}`} onClick={()=>setView('sales')}><i className="bi bi-cart-plus-fill"></i></button>
                        <button className={`nav-btn ${view==='depo'?'active':''}`} onClick={()=>{ if(!isDepoAuth) setModal('depo_auth'); else setView('depo'); }}><i className="bi bi-box-seam-fill"></i></button>
                        <button className={`nav-btn ${view==='reports'?'active':''}`} onClick={()=>setView('reports')}><i className="bi bi-graph-up"></i></button>
                    </nav>

                    <div className="container">
                        <input className="search-box" placeholder="Ara..." onInput={e=>setSearch(e.target.value.toLowerCase())} />

                        {view === 'customers' && (
                            <div>
                                <button className="btn btn-primary" style={{marginBottom:15}} onClick={()=>{setSelectedItem(null); setModal('customer')}}>+ Yeni Müşteri</button>
                                {data.customers.filter(c=>c.name.toLowerCase().includes(search)).map(c => (
                                    <div className="card" key={c.id}>
                                        <div style={{display:'flex', justifyContent:'space-between'}}>
                                            <b>{c.name}</b> <span style={{color:var(--danger)}}>{getBalance(c.id)} ₺</span>
                                        </div>
                                        <div style={{display:'flex', gap:10, marginTop:10}}>
                                            <button className="btn btn-wa" onClick={() => {
                                                const txs = data.transactions.filter(t=>t.customerId===c.id).slice(-3);
                                                let msg = `Sayın ${c.name}, son aldığınız malzemeler:\n` + txs.map(t=>`- ${t.qty} adet ${data.products.find(p=>p.id===t.productId)?.name}`).join('\n') + `\nToplam Borç: ${getBalance(c.id)} TL`;
                                                window.open(`https://wa.me/${c.phone}?text=${encodeURIComponent(msg)}`);
                                            }}>WhatsApp Döküm</button>
                                            <button className="btn btn-outline" onClick={()=>{setSelectedItem(c); setModal('customer')}}>Düzenle</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'sales' && (
                            <div className="card">
                                <h3>Hızlı Satış</h3>
                                <select id="sc"><option value="">Müşteri Seç...</option>{data.customers.map(c=><option value={c.id}>{c.name}</option>)}</select>
                                <select id="sp"><option value="">Malzeme Seç...</option>{data.products.map(p=><option value={p.id}>{p.name} ({p.stock})</option>)}</select>
                                <input id="sq" type="number" placeholder="Miktar" defaultValue="1" />
                                <button className="btn btn-primary" onClick={() => {
                                    const cId = document.getElementById('sc').value, pId = document.getElementById('sp').value, q = parseInt(document.getElementById('sq').value);
                                    const prod = data.products.find(p=>p.id===pId);
                                    if(!prod || prod.stock < q) return alert("Hata!");
                                    const tx = { id: Date.now(), customerId: cId, productId: pId, qty: q, total: prod.sellPrice * q, type:'satis', date: new Date() };
                                    const newProds = data.products.map(p=>p.id===pId ? {...p, stock: p.stock - q} : p);
                                    sync({...data, products: newProds, transactions: [...data.transactions, tx]});
                                    alert("Satış Yapıldı!");
                                }}>Satışı Tamamla</button>
                            </div>
                        )}

                        {view === 'depo' && (
                            <div>
                                <button className="btn btn-primary" style={{marginBottom:15}} onClick={()=>{setSelectedItem(null); setModal('product')}}>+ Yeni Malzeme Ekle</button>
                                {data.products.filter(p=>p.name.toLowerCase().includes(search)).map(p => (
                                    <div className="card" key={p.id} onClick={()=>{setSelectedItem(p); setModal('product')}}>
                                        <div style={{display:'flex', justifyContent:'space-between'}}>
                                            <span>{p.name}</span> <b>{p.stock} {p.unit}</b>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'reports' && (
                            <div>
                                <div className="card" style={{textAlign:'center'}}><h3>Toplam Alacak: {data.customers.reduce((s,c)=>s+getBalance(c.id),0)} ₺</h3></div>
                                <h4>Son İşlemler</h4>
                                {data.transactions.slice(-10).reverse().map(t => (
                                    <div className="card" key={t.id} style={{fontSize:12}}>
                                        {data.customers.find(c=>c.id===t.customerId)?.name} - {t.total} TL tutarında malzeme aldı.
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {modal === 'customer' && <CustomerModal />}
                    {modal === 'product' && <ProductModal />}
                    {modal === 'depo_auth' && (
                        <div className="overlay"><div className="modal">
                            <h3>Güvenlik Girişi</h3>
                            <input id="dp" type="password" placeholder="Depo Şifresi" />
                            <input id="gt" placeholder="GitHub Token" />
                            <button className="btn btn-primary" onClick={() => {
                                if(document.getElementById('dp').value === DEPO_PASS) {
                                    setGhInfo({...ghInfo, token: document.getElementById('gt').value});
                                    setIsDepoAuth(true); setModal(null); setView('depo');
                                } else alert("Şifre Yanlış!");
                            }}>Giriş</button>
                            <button className="btn btn-outline" style={{marginTop:8}} onClick={()=>setModal(null)}>Vazgeç</button>
                        </div></div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
