<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>UstaYapı Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f59e0b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --bg: #07090f; --card: #0e1420; --primary: #f59e0b; --text: #e8edf5; --border: #1b2438; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
        .navbar { background: var(--card); padding: 15px; display: flex; justify-content: space-around; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-btn { background: none; border: none; color: #64748b; font-size: 1.4rem; cursor: pointer; }
        .nav-btn.active { color: var(--primary); }
        .container { padding: 15px; max-width: 600px; margin: auto; padding-bottom: 100px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; }
        .btn-primary { background: var(--primary); color: #000; width: 100%; }
        .btn-wa { background: #25d366; color: #fff; width: 100%; }
        .btn-danger { background: #f05252; color: #fff; }
        input, select { width: 100%; padding: 12px; background: #07090f; border: 1px solid var(--border); border-radius: 8px; color: #fff; margin-top: 5px; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal { background: var(--card); width: 100%; max-width: 400px; padding: 25px; border-radius: 15px; border: 1px solid var(--border); }
        .stock-badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; background: #1b2438; color: var(--primary); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const MASTER_ADMIN = { user: "admin", pass: "1234" };
        const DEPO_PASS = "depo123";

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('customers'); 
            const [data, setData] = useState({ products: [], customers: [], transactions: [] });
            const [isDepoAuth, setIsDepoAuth] = useState(false);
            const [showDepoLogin, setShowDepoLogin] = useState(false);
            const [token, setToken] = useState("");

            useEffect(() => {
                fetch('data.json').then(r => r.json()).then(setData).catch(() => console.error("data.json eksik"));
            }, []);

            const syncGithub = async (updatedData) => {
                if(!token) return console.log("Token yok, sadece yerel.");
                // GitHub Sync logic: GitHub API calls would go here using 'token'
            };

            const handleSale = (cId, pId, q) => {
                const prod = data.products.find(p => p.id === pId);
                if(prod.stock < q) return alert("Stok yetersiz!");
                const amount = prod.sellPrice * q;
                const newData = {
                    ...data,
                    products: data.products.map(p => p.id === pId ? {...p, stock: p.stock - q} : p),
                    transactions: [...(data.transactions || []), { id: Date.now(), customerId: cId, amount, type: 'satis', date: new Date() }]
                };
                setData(newData);
                syncGithub(newData);
            };

            if (!user) return (
                <div className="overlay"><div className="modal">
                    <h2 style={{textAlign:'center'}}>UstaYapı Giriş</h2>
                    <input id="u" placeholder="Kullanıcı" /><input id="p" type="password" placeholder="Şifre" />
                    <button className="btn btn-primary" style={{marginTop:15}} onClick={() => {
                        const u = document.getElementById('u').value;
                        const p = document.getElementById('p').value;
                        if(u === MASTER_ADMIN.user && p === MASTER_ADMIN.pass) setUser(u);
                        else alert("Hata!");
                    }}>Giriş</button>
                </div></div>
            );

            return (
                <div>
                    <nav className="navbar">
                        <button className={`nav-btn ${view==='customers'?'active':''}`} onClick={()=>setView('customers')}><i className="bi bi-people-fill"></i></button>
                        <button className={`nav-btn ${view==='sales'?'active':''}`} onClick={()=>setView('sales')}><i className="bi bi-cart-plus-fill"></i></button>
                        <button className={`nav-btn ${view==='depo'?'active':''}`} onClick={()=>{ if(!isDepoAuth) setShowDepoLogin(true); else setView('depo'); }}><i className="bi bi-box-seam-fill"></i></button>
                    </nav>

                    <div className="container">
                        {view === 'customers' && data.customers.map(c => (
                            <div className="card" key={c.id}>
                                <strong>{c.name}</strong>
                                <div style={{marginTop:10}}><button className="btn btn-wa" onClick={() => window.open(`https://wa.me/${c.phone}?text=Borcunuz var.`)}>WhatsApp Paylaş</button></div>
                            </div>
                        ))}

                        {view === 'sales' && (
                            <div className="card">
                                <h3>Satış Yap</h3>
                                <select id="sc">{data.customers.map(c => <option value={c.id}>{c.name}</option>)}</select>
                                <select id="sp">{data.products.map(p => <option value={p.id}>{p.name} ({p.stock})</option>)}</select>
                                <input id="sq" type="number" defaultValue="1" />
                                <button className="btn btn-primary" onClick={()=>handleSale(document.getElementById('sc').value, document.getElementById('sp').value, parseInt(document.getElementById('sq').value))}>Tamamla</button>
                            </div>
                        )}

                        {view === 'depo' && data.products.map(p => (
                            <div className="card" key={p.id} style={{display:'flex', justifyContent:'space-between'}}>
                                <span>{p.name}</span> <span className="stock-badge">Stok: {p.stock}</span>
                            </div>
                        ))}
                    </div>

                    {showDepoLogin && (
                        <div className="overlay"><div className="modal">
                            <h3>Depo Girişi</h3>
                            <input id="dp" type="password" placeholder="Depo Şifresi" />
                            <input id="tk" type="password" placeholder="GitHub Token" />
                            <button className="btn btn-primary" onClick={()=>{
                                if(document.getElementById('dp').value === DEPO_PASS) {
                                    setToken(document.getElementById('tk').value);
                                    setIsDepoAuth(true); setShowDepoLogin(false); setView('depo');
                                } else alert("Şifre yanlış!");
                            }}>Yetki Al</button>
                        </div></div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
