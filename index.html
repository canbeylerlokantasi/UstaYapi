// ── GITHUB API ────────────────────────────────────────────────
async function ghLoad(cfg){
  const url=`https://raw.githubusercontent.com/${cfg.owner}/${cfg.repo}/main/data.json?t=${Date.now()}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error("Veri yüklenemedi");
  return r.json();
}
async function ghSave(cfg,data){
  const headers={"Authorization":`token ${cfg.token}`,"Content-Type":"application/json","User-Agent":"UstaYapi-PWA"};
  // get sha
  const meta=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/data.json`,{headers});
  const mj=await meta.json();
  if(!mj.sha) throw new Error("SHA alınamadı");
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  const res=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/data.json`,{
    method:"PUT",headers,
    body:JSON.stringify({message:"UstaYapı: güncellendi",content,sha:mj.sha})
  });
  if(!res.ok) throw new Error("Kayıt hatası");
}

// ── BARCODE ───────────────────────────────────────────────────
function Barcode({value="",height=44}){
  const bars=useMemo(()=>{
    const s=(value||"").padEnd(8,"0").slice(0,12);
    const r=[];
    let ib=true;
    r.push({w:2,b:true});r.push({w:1,b:false});r.push({w:2,b:true});
    for(let i=0;i<s.length;i++){
      const c=s.charCodeAt(i)%10;
      r.push({w:[3,2,1,1,2,3,2,1,3,1][c]||2,b:ib});
      r.push({w:[2,1,1,1,1,2,1,1,2,1][c]||1,b:!ib});
      ib=!ib;
    }
    r.push({w:2,b:true});r.push({w:1,b:false});r.push({w:2,b:true});
    return r;
  },[value]);
  const total=bars.reduce((s,b)=>s+b.w,0);
  const W=150;const sc=W/total;let x=0;
  return <div style={{textAlign:"center"}}>
    <svg width={W} height={height}>
      {bars.map((b,i)=>{const bx=x;x+=b.w*sc;return b.b?<rect key={i} x={bx} y={0} width={b.w*sc} height={height-10} fill="#000"/>:null;})}
      <text x={W/2} y={height} textAnchor="middle" fontSize={8} fontFamily="monospace" fill="#333">{value}</text>
    </svg>
  </div>;
}

// ── GITHUB SETUP ──────────────────────────────────────────────
function GitHubSetup({onSave,onSkip}){
  const [owner,setOwner]=useState("");
  const [repo,setRepo]=useState("");
  const [token,setToken]=useState("");
  const [testing,setTesting]=useState(false);
  const [err,setErr]=useState("");
  const test=async()=>{
    if(!owner||!repo||!token){setErr("Tüm alanları doldurunuz!");return;}
    setTesting(true);setErr("");
    try{
      const r=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data.json`,{headers:{"Authorization":`token ${token}`,"User-Agent":"UstaYapi"}});
      if(!r.ok) throw new Error("Repo bulunamadı veya token hatalı");
      onSave({owner,repo,token});
    }catch(e){setErr(e.message);}
    setTesting(false);
  };
  return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:20,padding:36,width:"100%",maxWidth:420}}>
      <div style={{display:"flex",justifyContent:"center",marginBottom:16}}><Logo size={60}/></div>
      <h2 style={{color:C.accent,fontSize:22,fontWeight:800,textAlign:"center",marginBottom:4}}>UstaYapı</h2>
      <p style={{color:C.muted,fontSize:13,textAlign:"center",marginBottom:28}}>GitHub ile veri senkronizasyonu</p>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Field label="GitHub Kullanıcı Adı"><Inp value={owner} onChange={setOwner} placeholder="kullanici-adi"/></Field>
        <Field label="Repository Adı"><Inp value={repo} onChange={setRepo} placeholder="ustayapi-data"/></Field>
        <Field label="Personal Access Token">
          <Inp value={token} onChange={setToken} type="password" placeholder="ghp_xxxxxxxxxxxx"/>
        </Field>
        <div style={{background:C.blueBg,border:`1px solid ${C.blueBorder}`,borderRadius:10,padding:"12px 14px",fontSize:12,color:C.sub,lineHeight:1.7}}>
          <strong style={{color:C.blue}}>Token nasıl alınır?</strong><br/>
          github.com → Settings → Developer settings → Personal access tokens → Generate new token → <em>repo</em> yetkisi seçin
        </div>
        {err&&<p style={{color:C.danger,fontSize:13,textAlign:"center"}}>{err}</p>}
        <Btn onClick={test} full disabled={testing}>{testing?"⏳ Test ediliyor...":"🔗 Bağlan ve Başla"}</Btn>
        <button onClick={onSkip} style={{background:"none",border:"none",color:C.muted,fontSize:13,cursor:"pointer",padding:"8px",textDecoration:"underline"}}>
          GitHub olmadan devam et (sadece bu cihaz)
        </button>
      </div>
    </div>
  </div>;
}
