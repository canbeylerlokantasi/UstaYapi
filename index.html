<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>UstaYapı Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f59e0b">
<style>
/* Mevcut stiller korunmuştur, müşteri kartları için eklemeler yapılmıştır */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#07090f;font-family:'Segoe UI',sans-serif;color:#e8edf5}
.card{background:#0e1420;border:1px solid #1b2438;border-radius:14px;padding:16px;margin-bottom:12px}
.btn-whatsapp{background:#25d366;color:#fff}
.inp{background:#07090f;border:1px solid #1b2438;border-radius:10px;padding:10px;color:#fff;width:100%}
/* ... diğer CSS kuralları ... */
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { h, render } from 'https://esm.sh/preact@10';
import { useState, useEffect } from 'https://esm.sh/preact@10/hooks';
import { html } from 'https://esm.sh/htm@3/preact';

// Sabit Admin (Güvenlik Sibobu)
const MASTER_ADMIN = { username: 'admin', password: '1234', role: 'admin' };

function App() {
  const [user, setUser] = useState(null);
  const [view, setView] = useState('customers'); // Varsayılan: Müşteriler
  const [data, setData] = useState({ customers: [], products: [], users: [] });

  // WhatsApp Paylaşım Fonksiyonu
  const shareAccount = (customer) => {
    const text = `Sayın ${customer.name}, UstaYapı güncel bakiye özetiniz hazırlanmıştır. Toplam Borç: ${customer.balance || 0} TL.`;
    window.open(`https://wa.me/${customer.phone}?text=${encodeURIComponent(text)}`);
  };

  // Yeni Kullanıcı Kaydı
  const registerUser = async (newUser) => {
    const updatedUsers = [...(data.users || []), newUser];
    const newData = { ...data, users: updatedUsers };
    setData(newData);
    // GitHub'a otomatik kaydet (Token varsa)
    await saveToGithub(newData);
  };

  // Müşteri Silme
  const deleteCustomer = (id) => {
    if(confirm('Müşteriyi silmek istediğinize emin misiniz?')) {
      const filtered = data.customers.filter(c => c.id !== id);
      setData({ ...data, customers: filtered });
    }
  };

  if (!user) {
    return html`<${LoginPage} onLogin=${setUser} onRegister=${registerUser} />`;
  }

  return html`
    <div class="main-layout">
      <nav class="top-nav">
        <button class=${view === 'customers' ? 'active' : ''} onClick=${() => setView('customers')}>👤 Müşteriler</button>
        <button class=${view === 'products' ? 'active' : ''} onClick=${() => setView('products')}>📦 Ürünler</button>
      </nav>

      <main>
        ${view === 'customers' && html`
          <div class="customer-list">
            ${data.customers.map(c => html`
              <div class="card">
                <h3>${c.name}</h3>
                <p>Borç: <span style="color:#f05252">${c.balance || 0} ₺</span></p>
                <div class="actions" style="margin-top:10px; display:flex; gap:8px">
                  <button class="btn btn-sm btn-whatsapp" onClick=${() => shareAccount(c)}>📱 Paylaş</button>
                  <button class="btn btn-sm btn-ghost" onClick=${() => editCustomer(c)}>✏️ Düzenle</button>
                  <button class="btn btn-sm btn-danger" onClick=${() => deleteCustomer(c.id)}>🗑️ Sil</button>
                </div>
              </div>
            `)}
          </div>
        `}
      </main>
    </div>
  `;
}

// Giriş Ekranı Bileşeni
function LoginPage({ onLogin, onRegister }) {
  const [mode, setMode] = useState('login');
  const [form, setForm] = useState({ u: '', p: '' });

  const handleAction = () => {
    if (form.u === MASTER_ADMIN.username && form.p === MASTER_ADMIN.password) {
      onLogin(MASTER_ADMIN);
    } else if (mode === 'register') {
      onRegister({ ...form, id: Date.now() });
      alert('Kayıt başarılı, giriş yapabilirsiniz.');
      setMode('login');
    } else {
      // Normal kullanıcı kontrolü buraya gelecek
    }
  };

  return html`
    <div class="login-box">
      <h2>${mode === 'login' ? 'Giriş Yap' : 'Yeni Hesap Oluştur'}</h2>
      <input class="inp" placeholder="Kullanıcı Adı" onInput=${e => setForm({...form, u: e.target.value})} />
      <input class="inp" type="password" placeholder="Şifre" onInput=${e => setForm({...form, p: e.target.value})} />
      <button class="btn btn-primary" onClick=${handleAction}>
        ${mode === 'login' ? 'Giriş' : 'Kayıt Ol'}
      </button>
      <p onClick=${() => setMode(mode === 'login' ? 'register' : 'login')} style="cursor:pointer; font-size:12px; margin-top:10px">
        ${mode === 'login' ? 'Yeni hesap oluştur' : 'Zaten hesabım var'}
      </p>
    </div>
  `;
}

render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
